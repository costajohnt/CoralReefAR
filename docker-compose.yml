services:
  server:
    build:
      context: .
      dockerfile: infra/Dockerfile.server
    container_name: reef-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - ./data:/data
    environment:
      - NODE_ENV=production
      - PORT=8787
      - DB_PATH=/data/reef.db
      - ADMIN_TOKEN=${ADMIN_TOKEN:?set ADMIN_TOKEN in .env}
      - RATE_LIMIT_WINDOW_MS=3600000
      - RATE_LIMIT_MAX=1

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: reef-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:?set in .env}
    depends_on:
      - server
