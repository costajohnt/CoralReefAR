<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reef species preview</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; padding: 0; background: #02111d; color: #eef; font-family: system-ui, sans-serif; }
    header { padding: 1rem 1.2rem; border-bottom: 1px solid #123; }
    header h1 { font-size: 1.1rem; margin: 0 0 0.2rem; }
    header p { margin: 0; color: #9ab; font-size: 0.85rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 1rem; padding: 1rem; }
    .cell { background: #061726; border: 1px solid #0f2a3f; border-radius: 8px; overflow: hidden; }
    .cell canvas { display: block; width: 100%; height: 170px; }
    .cell .label { padding: 0.35rem 0.5rem; font-size: 0.75rem; color: #bcd; display: flex; justify-content: space-between; }
    .cell .label b { color: #fff; font-weight: 600; }
    .controls { padding: 0.8rem 1.2rem; border-bottom: 1px solid #123; display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; }
    .controls label { font-size: 0.85rem; color: #9ab; display: flex; gap: 0.3rem; align-items: center; }
    .controls input[type=number] { width: 4rem; background: #0b1d2a; color: #eef; border: 1px solid #1d3045; border-radius: 4px; padding: 0.2rem 0.3rem; }
    .controls button { background: #1b3a54; color: #eef; border: 0; border-radius: 4px; padding: 0.35rem 0.9rem; font-size: 0.85rem; cursor: pointer; }
    .controls button:hover { background: #254e6f; }
  </style>
</head>
<body>
  <header>
    <h1>Reef species preview</h1>
    <p>Non-AR visual check of every species. Orbit each tile with the mouse. This page is a developer tool, not shipped to visitors. Browsers cap live WebGL contexts at ~16; above that tiles render blank.</p>
  </header>
  <div class="controls">
    <label>Seeds per species <input id=count type=number min=1 max=24 value=3 /></label>
    <label>Color
      <select id=color>
        <option value="">(palette cycle)</option>
      </select>
    </label>
    <button id=reseed>Reseed</button>
  </div>
  <div id=grid class="grid"></div>
  <script type="module" src="/src/preview.ts"></script>
</body>
</html>
